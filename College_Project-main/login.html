<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | TNPSC Online Examination System</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(to right,#1e3c72,#2a5298);
height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#0a3d62;
padding:15px;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
width:90%;
margin:auto;
}

nav ul{
list-style:none;
display:flex;
gap:20px;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav ul li a:hover{
color:#fbc531;
}

.login-container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:8px;
width:350px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
color:#0a3d62;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

.input-group input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.btn{
width:100%;
padding:12px;
background:#0a3d62;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

.btn:hover{
background:#07406b;
}

.register-link{
text-align:center;
margin-top:15px;
}

.register-link a{
text-decoration:none;
color:#0a3d62;
font-weight:bold;
}

footer{
background:#0a3d62;
color:white;
text-align:center;
padding:10px;
}

</style>

</head>

<body>

<header>

<nav>

<h2>
<img src="images/icons/login.png" width="25">
User Login
</h2>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="register.html">Register</a></li>
</ul>

</nav>

</header>

<div class="login-container">

<div class="login-box">

<h2>User Login</h2>

<form action="exam.html" method="post">

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password" required>
</div>

<button type="submit" class="btn">Login</button>

</form>

<div class="register-link">
<p>Don't have an account? <a href="register.html">Register</a></p>
</div>

</div>

</div>

<footer>

<p>© 2026 TNPSC Online Examination System</p>

</footer>

</body>
</html>
